name: Release Client

on:
  push:
    tags:
      - "client/v*"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - name: Install dependencies
        working-directory: coincasa_app_flutter_frontend
        run: flutter pub get

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#client/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_name=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Build APK
        working-directory: coincasa_app_flutter_frontend
        run: |
          flutter build apk --release \
            --build-name "${{ steps.version.outputs.build_name }}" \
            --build-number "${{ github.run_number }}" \
            --dart-define=API_BASE_URL=http://10.137.139.36/api/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Client ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          files: coincasa_app_flutter_frontend/build/app/outputs/flutter-apk/app-release.apk
