name: Release Server
on:
  push:
    tags:
      - 'server/v*'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint .

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  docker:
    runs-on: ubuntu-latest
    needs: [lint, hadolint]
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase repository name
        id: lowercase
        run: |
          echo "repository=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#server/}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.repository }}/server:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ steps.lowercase.outputs.repository }}/server:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Server ${{ steps.version.outputs.VERSION }}"
          body: "Docker image: `ghcr.io/${{ steps.lowercase.outputs.repository }}/server:${{ steps.version.outputs.VERSION }}`"
          tag_name: ${{ github.ref_name }}
