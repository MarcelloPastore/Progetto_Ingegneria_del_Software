name: Release Server

on:
  push:
    tags:
      - 'server/v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#server/}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/server:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/server:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Server ${{ steps.version.outputs.VERSION }}"
          body: "Docker image: `ghcr.io/${{ github.repository }}/server:${{ steps.version.outputs.VERSION }}`"
          tag_name: ${{ github.ref_name }}
