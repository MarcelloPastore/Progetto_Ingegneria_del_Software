apiVersion: v1
kind: Pod
metadata:
  namespace: {{ .Values.namespace }}
  name: "{{ include "coincasa-chart.fullname" . }}-test-connection"
  labels:
    {{- include "coincasa-chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "coincasa-chart.fullname" . }}:{{ .Values.service.port }}']
  restartPolicy: Never
